default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

sqlite: &sqlite
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: otaku_sen_development
  cache:
    <<: *default
    database: otaku_sen_development_cache
    migrations_paths: db/cache_migrate
  cable:
    <<: *default
    database: otaku_sen_development_cable
    migrations_paths: db/cable_migrate

test:
  <<: *default
  database: otaku_sen_test

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV['DATABASE_URL'] %>
  cache:
    <<: *primary_production
    database: <%= ENV['DATABASE_URL'] %>_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: <%= ENV['DATABASE_URL'] %>_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: <%= ENV['DATABASE_URL'] %>_cable
    migrations_paths: db/cable_migrate
    