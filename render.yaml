services:
  - type: web
    name: otakusen
    runtime: ruby
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    plan: free
    env: production
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: otakusen-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false

databases:
  - name: otakusen-db
    plan: free
